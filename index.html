<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>煤炭检测报告生成器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:SimSun,Microsoft YaHei;}
body{padding:10px;max-width:820px;margin:0 auto;background:#eee;}
.form-box{background:#fff;padding:12px;border-radius:8px;margin-bottom:10px;max-height:60vh;overflow-y:auto;}
input{width:100%;padding:9px;margin:5px 0;font-size:15px;border:1px solid #ccc;border-radius:4px;}
button{width:100%;padding:14px;background:#0066cc;color:#fff;border:none;border-radius:6px;font-size:17px;font-weight:bold;margin:7px 0;}
#canvas{width:100%;background:#fff;display:block;border:1px solid #ddd;
    image-rendering: -moz-crisp-edges;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
}
.tip{font-size:13px;color:#d00;margin:4px 0 8px;}
</style>
</head>
<body>
<div class="form-box">
    <div class="tip">填写全部数据，输入时画布自动实时预览</div>
    <input type="text" id="reportId" placeholder="报告编号">
    <input type="text" id="unit" placeholder="送检单位">
    <input type="text" id="sender" placeholder="送样人">
    <input type="text" id="sampleName" placeholder="样品名称">
    <input type="text" id="sendTime" placeholder="送样时间">
    <input type="text" id="Mt" placeholder="收到基全水 Mt">
    <input type="text" id="Mad" placeholder="空气干燥基水分 Mad">
    <input type="text" id="Ad" placeholder="干基灰分 Ad">
    <input type="text" id="Vad" placeholder="空气干燥基挥发 Vad">
    <input type="text" id="Vdaf" placeholder="干燥无灰基挥发 Vdaf">
    <input type="text" id="Qgrad" placeholder="空气干燥基高位 Qgr,ad">
    <input type="text" id="Qnetar" placeholder="收到基低位 Qnet,ar">
    <input type="text" id="FCd" placeholder="固定碳 FCd">
    <input type="text" id="Sd" placeholder="干基全硫 Sd">
    <input type="text" id="Sar" placeholder="收到基硫 Sar">
    <input type="text" id="cokeNo" placeholder="焦号">
</div>
<button onclick="renderImage()">手动刷新预览单据</button>
<canvas id="canvas" width="1600" height="2260"></canvas>
<button onclick="downloadImg()">下载高清图片到相册</button>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
ctx.mozImageSmoothingEnabled = false;
ctx.webkitImageSmoothingEnabled = false;

const bgImg = new Image();
// ==========替换为Github raw高清原图链接==========
bgImg.src = "https://raw.githubusercontent.com/qiexia6677/huayandan-shengchengqi/main/bg.png";
bgImg.crossOrigin = "anonymous";

bgImg.onerror = function(){
    alert("底图加载失败，请检查Github图片链接");
}
bgImg.onload = function(){
    renderImage();
}

const textConfig = [
    {id:"reportId",    x:240, y:180,  font:"40px SimSun",color:"#000"},
    {id:"unit",        x:260, y:260,  font:"40px SimSun",color:"#000"},
    {id:"sender",      x:260, y:340,  font:"40px SimSun",color:"#000"},
    {id:"sampleName",  x:260, y:420,  font:"40px SimSun",color:"#000"},
    {id:"sendTime",    x:260, y:500,  font:"40px SimSun",color:"#000"},
    {id:"Mt",          x:520, y:600,  font:"38px SimSun",color:"#000"},
    {id:"Mad",         x:800, y:600,  font:"38px SimSun",color:"#000"},
    {id:"Ad",          x:1060,y:600,  font:"38px SimSun",color:"#000"},
    {id:"Vad",         x:520, y:680,  font:"38px SimSun",color:"#000"},
    {id:"Vdaf",        x:800, y:680,  font:"38px SimSun",color:"#000"},
    {id:"Qgrad",       x:1060,y:680,  font:"38px SimSun",color:"#000"},
    {id:"Qnetar",      x:520, y:760,  font:"38px SimSun",color:"#000"},
    {id:"FCd",         x:800, y:760,  font:"38px SimSun",color:"#000"},
    {id:"Sd",          x:1060,y:760,  font:"38px SimSun",color:"#000"},
    {id:"Sar",         x:520, y:840,  font:"38px SimSun",color:"#000"},
    {id:"cokeNo",      x:800, y:840,  font:"40px SimSun",color:"#000"},
];

function renderImage(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(bgImg,0,0,canvas.width,canvas.height);
    textConfig.forEach(item=>{
        const inputDom = document.getElementById(item.id);
        const text = inputDom.value.trim();
        if(text){
            ctx.fillStyle = item.color;
            ctx.font = item.font;
            ctx.fillText(text, item.x, item.y);
        }
    })
}

function downloadImg(){
    renderImage();
    setTimeout(()=>{
        const imgUrl = canvas.toDataURL("image/png", 1.0);
        if(navigator.userAgent.toLowerCase().match(/micromessenger|iphone|ipad/)){
            const newWin = window.open("");
            newWin.document.write(`<html><body style="margin:0;background:#fff;"><img src="${imgUrl}" style="width:100%;"><p style="text-align:center;padding:10px;font-size:14px;">长按图片保存到手机相册</p></body></html>`);
        }else{
            const aTag = document.createElement("a");
            aTag.href = imgUrl;
            aTag.download = "煤炭检测报告_"+new Date().getTime()+".png";
            document.body.appendChild(aTag);
            aTag.remove();
        }
    },300)
}

document.querySelectorAll("input").forEach(input=>{
    input.addEventListener("input",renderImage);
})
</script>
</body>
</html>
